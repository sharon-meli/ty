{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tycoons Lounge</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container py-4">
    <header class="d-flex align-items-center mb-4">
      <div style="width:80px"><img src="{% static 'images/logo.svg' %}" alt="logo" style="max-width:100%"></div>
      <h1 class="ms-3">Tycoons Lounge</h1>
    </header>

    <div class="mb-3">
      <a class="btn btn-primary" href="{% url 'dashboard:index' %}">📦 Dashboard</a>
      <a class="btn btn-success" href="{% url 'dashboard:add_product' %}">➕ Add Product</a>
      <a class="btn btn-warning" href="{% url 'dashboard:add_sale' %}">➕ Add Sale</a>
      <a class="btn btn-info" href="{% url 'dashboard:reports' 'daily' %}">📊 Reports</a>
      <a class="btn btn-secondary" href="{% url 'dashboard:sales_list' %}">Sales List</a>
    </div>

    {% block content %}{% endblock %}

    <footer class="mt-5 py-3 text-center" style="background:#6b3f2e;color:#fff;">
      © Tycoons Lounge
    </footer>
  </div>
</body>
</html>
